name: Build Release APK

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run tests
        run: npm run test:run

  build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install NDK and CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.1.12297006" "cmake;3.18.1"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build tonutils-proxy from source
        run: |
          git clone --depth 1 --branch v1.9.0 https://github.com/TONresistor/Tonutils-Proxy.git /tmp/tonutils-proxy
          cd /tmp/tonutils-proxy
          mkdir -p $GITHUB_WORKSPACE/android/app/libs/jniLibs/arm64-v8a
          CC=$ANDROID_HOME/ndk/27.1.12297006/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang \
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
          go build -buildmode c-shared -trimpath \
            -gcflags=all="-l" \
            -ldflags="-w -s -X main.GitCommit=v1.9.0" \
            -o $GITHUB_WORKSPACE/android/app/libs/jniLibs/arm64-v8a/libtonutils-proxy.so \
            cmd/lib/main.go

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > /tmp/keystore.jks
          UNSIGNED=$(find android/app/build/outputs/apk/release -name '*-unsigned.apk' | head -1)
          ALIGNED=/tmp/app-aligned.apk
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/zipalign -f 4 "$UNSIGNED" "$ALIGNED"
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            "$ALIGNED"
          VERSION="${{ github.event.release.tag_name || 'dev' }}"
          mv "$ALIGNED" tonnet-browser-${VERSION}.apk
          rm -f /tmp/keystore.jks

      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tonnet-browser-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tonnet-browser-apk
          path: tonnet-browser-*.apk

  # ─────────────────────────────────────────────
  # Notify: Telegram
  # ─────────────────────────────────────────────
  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping"
            exit 0
          fi
          VERSION="${{ github.event.release.tag_name || 'dev' }}"
          if [ "$BUILD_RESULT" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          TEXT="${ICON} <b>[Mobile] Release ${VERSION}</b>"
          printf -v TEXT '%s\n\nBuild: %s' "$TEXT" "$BUILD_RESULT"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION}"
          printf -v TEXT '%s\n<a href="%s">View release</a>' "$TEXT" "$RELEASE_URL"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="${TEXT}"
