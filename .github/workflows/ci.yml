name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Validate: type-check, tests, build
  # ─────────────────────────────────────────────
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

      - name: Build web
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=critical
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Android: build debug APK
  # ─────────────────────────────────────────────
  android:
    name: Android Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install NDK and CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.1.12297006" "cmake;3.18.1"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build tonutils-proxy from source
        run: |
          git clone --depth 1 --branch v1.9.4 https://github.com/TONresistor/Tonutils-Proxy.git /tmp/tonutils-proxy
          cd /tmp/tonutils-proxy
          mkdir -p $GITHUB_WORKSPACE/android/app/libs/jniLibs/arm64-v8a
          CC=$ANDROID_HOME/ndk/27.1.12297006/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang \
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
          go build -buildmode c-shared -trimpath \
            -gcflags=all="-l" \
            -ldflags="-w -s -X main.GitCommit=v1.9.4" \
            -o $GITHUB_WORKSPACE/android/app/libs/jniLibs/arm64-v8a/libtonutils-proxy.so \
            cmd/lib/main.go

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleProdDebug

      - name: Upload APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tonnet-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/prod/debug/app-prod-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # Notify: Telegram (push to main only)
  # ─────────────────────────────────────────────
  notify:
    needs: [test, android]
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_RESULT: ${{ needs.test.result }}
          ANDROID_RESULT: ${{ needs.android.result }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping"
            exit 0
          fi
          COMMIT_TITLE=$(git log -1 --pretty=format:'%s' | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          COMMIT_DESC=$(git log -1 --pretty=format:'%b' | head -80 | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          TEXT="<b>[Mobile] ${COMMIT_TITLE}</b>"
          if [ -n "$COMMIT_DESC" ]; then
            printf -v TEXT '%s\n\n%s' "$TEXT" "$COMMIT_DESC"
          fi
          printf -v TEXT '%s\n\n<a href="%s">View commit %s</a>' "$TEXT" "$COMMIT_URL" "$COMMIT_SHA"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="${TEXT}"
